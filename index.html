/* ── Open Food Facts API search (with cache + offline fallback) ── */
const API_CACHE_KEY = "bite-api-cache";

function getApiCache() { return ld(API_CACHE_KEY, {}); }
function setApiCache(query, results) {
  const cache = getApiCache();
  cache[query.toLowerCase().trim()] = { results, ts: Date.now() };
  // Keep max 80 cached queries
  const keys = Object.keys(cache);
  if (keys.length > 80) {
    const sorted = keys.sort((a, b) => cache[a].ts - cache[b].ts);
    sorted.slice(0, keys.length - 80).forEach(k => delete cache[k]);
  }
  sv(API_CACHE_KEY, cache);
}

async function searchAPI(query) {
  const key = query.toLowerCase().trim();
  const cache = getApiCache();
  // Return cached if < 7 days old
  if (cache[key] && Date.now() - cache[key].ts < 7 * 86400000) return cache[key].results;
  // Check online
  if (!navigator.onLine) {
    // Search across all cached results as fallback
    const allCached = Object.values(cache).flatMap(c => c.results || []);
    return allCached.filter(f => f.n.toLowerCase().includes(key)).slice(0, 6);
  }
  try {
    const r = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8&fields=product_name,nutriments`);
    if (!r.ok) return cache[key]?.results || [];
    const d = await r.json();
    const results = (d.products || []).filter(p => p.product_name && p.nutriments?.["energy-kcal_100g"])
      .map(p => ({ n: p.product_name.slice(0, 50), cal: Math.round(p.nutriments["energy-kcal_100g"]||0), p: Math.round((p.nutriments.proteins_100g||0)*10)/10, f: Math.round((p.nutriments.fat_100g||0)*10)/10, c: Math.round((p.nutriments.carbohydrates_100g||0)*10)/10, per: "100g", e: "🏷️" })).slice(0, 6);
    setApiCache(key, results);
    return results;
  } catch { return cache[key]?.results || []; }
}

const sv = (k, d) => localStorage.setItem(k, JSON.stringify(d));
const getMT = () => { const h = new Date().getHours(); return h < 11 ? "breakfast" : h < 15 ? "lunch" : h < 18 ? "snack" : "dinner"; };

function Ring({ eaten, goal }) {
  const pct = Math.min(eaten / Math.max(goal, 1), 1);
  const over = eaten > goal;
  const r = 60, c = 2 * Math.PI * r, rem = Math.max(goal - eaten, 0);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "24px 0 12px" }}>
      <div style={{ position: "relative", width: 152, height: 152 }}>
        <svg width="152" height="152" viewBox="0 0 152 152">
          <circle cx="76" cy="76" r={r} fill="none" stroke="var(--s3)" strokeWidth="11" />
          <circle cx="76" cy="76" r={r} fill="none"
            stroke={over ? "var(--red)" : "var(--acc)"} strokeWidth="11" strokeLinecap="round"
            strokeDasharray={c} strokeDashoffset={c - pct * c}
            transform="rotate(-90 76 76)"
            style={{ transition: "stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1)" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontSize: 30, fontWeight: 750, letterSpacing: -1.5, lineHeight: 1 }}>{eaten.toLocaleString()}</span>
          <span style={{ fontSize: 12, color: "var(--t2)", marginTop: 3 }}>van {goal.toLocaleString()}</span>
        </div>
      </div>
      <div style={{ display: "flex", gap: 28, marginTop: 14 }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 15, fontWeight: 650 }}>{eaten.toLocaleString()}</div>
          <div style={{ fontSize: 11, color: "var(--t3)" }}>gegeten</div>
        </div>
        <div style={{ width: 1, background: "var(--s3)", alignSelf: "stretch" }} />
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 15, fontWeight: 650, color: over ? "var(--red)" : "var(--acc)" }}>{rem.toLocaleString()}</div>
          <div style={{ fontSize: 11, color: "var(--t3)" }}>resterend</div>
        </div>
      </div>
    </div>
  );
}

function MacroBar({ label, cur, goal, color }) {
  const pct = Math.min((cur / Math.max(goal, 1)) * 100, 100);
  return (
    <div style={{ flex: 1, textAlign: "center" }}>
      <div style={{ fontSize: 18, fontWeight: 700, color, lineHeight: 1 }}>{Math.round(cur)}</div>
      <div style={{ fontSize: 10, color: "var(--t3)", margin: "3px 0 6px" }}>/ {goal}g</div>
      <div style={{ height: 4, borderRadius: 2, background: "var(--s3)", overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, borderRadius: 2, background: color, transition: "width 0.6s cubic-bezier(.4,0,.2,1)" }} />
      </div>
      <div style={{ fontSize: 10, color: "var(--t3)", marginTop: 5, fontWeight: 500 }}>{label}</div>
    </div>
  );
}

function TodayScreen({ meals, goals, onDel, goAdd }) {
  const tm = useMemo(() => meals.filter(m => m.date === td()), [meals]);
  const tot = useMemo(() => tm.reduce((a, m) => ({ cal: a.cal + m.cal, p: a.p + m.p, f: a.f + m.f, c: a.c + m.c }), { cal: 0, p: 0, f: 0, c: 0 }), [tm]);
  const grp = MT.map(t => ({ ...t, items: tm.filter(m => m.type === t.id) })).filter(g => g.items.length > 0);

  return (
    <div className="sp">
      <div className="crd ai">
        <Ring eaten={Math.round(tot.cal)} goal={goals.calories} />
      </div>
      <div className="crd ai" style={{ animationDelay: "50ms", marginTop: 10 }}>
        <div style={{ display: "flex", gap: 12 }}>
          <MacroBar label="Eiwit" cur={tot.p} goal={goals.protein} color="var(--blue)" />
          <div style={{ width: 1, background: "var(--s3)", margin: "4px 0" }} />
          <MacroBar label="Vet" cur={tot.f} goal={goals.fat} color="var(--amber)" />
          <div style={{ width: 1, background: "var(--s3)", margin: "4px 0" }} />
          <MacroBar label="Carbs" cur={tot.c} goal={goals.carbs} color="var(--green)" />
        </div>
      </div>
      <div className="crd ai" style={{ animationDelay: "100ms", marginTop: 10 }}>
        {tm.length === 0 ? (
          <div style={{ textAlign: "center", padding: "28px 0" }}>
            <div style={{ fontSize: 36, marginBottom: 10, opacity: 0.8 }}>🍽️</div>
            <div style={{ fontSize: 14, color: "var(--t2)", marginBottom: 16 }}>Nog niets gelogd</div>
            <button className="pbtn" onClick={goAdd}>+ Voeg toe</button>
          </div>
        ) : grp.map(g => (
          <div key={g.id} style={{ marginBottom: 6 }}>
            <div className="slbl">{g.i} {g.l}</div>
            {g.items.map(m => <MealRow key={m.id} meal={m} onDel={onDel} />)}
          </div>
        ))}
      </div>
    </div>
  );
}

function AddScreen({ onAdd, meals, fav, onTogFav }) {
  const [mode, setMode] = useState("search");
  const [q, setQ] = useState("");
  const [qc, setQc] = useState("");
  const [sel, setSel] = useState(null);
  const [amt, setAmt] = useState(100);
  const [portions, setPortions] = useState(1);
  const [mt, setMt] = useState(() => { const h = new Date().getHours(); return h < 11 ? "breakfast" : h < 15 ? "lunch" : h < 18 ? "snack" : "dinner"; });
  const [apiRes, setApiRes] = useState([]);
  const [apiLoading, setApiLoading] = useState(false);
  const ir = useRef(null);
  const apiTimer = useRef(null);

  useEffect(() => { if (mode === "search" && ir.current) ir.current.focus(); }, [mode]);

  // Debounced API search
  useEffect(() => {
    if (q.length < 3) { setApiRes([]); return; }
    clearTimeout(apiTimer.current);
    apiTimer.current = setTimeout(async () => {
      const localHits = FOODS.filter(f => f.n.toLowerCase().includes(q.toLowerCase()));
      if (localHits.length >= 4) { setApiRes([]); return; } // enough local results
      setApiLoading(true);
      const results = await searchAPI(q);
      setApiRes(results);
      setApiLoading(false);
    }, 500);
    return () => clearTimeout(apiTimer.current);
  }, [q]);

  const rec = useMemo(() => {
    const s = new Set();
    return meals.filter(m => m.foodRef && !s.has(m.foodRef) && s.add(m.foodRef)).slice(-8).reverse();
  }, [meals]);

  const localRes = q.length >= 2 ? FOODS.filter(f => f.n.toLowerCase().includes(q.toLowerCase())).slice(0, 8) : [];

  const doQ = () => {
    const cal = parseInt(qc); if (!cal || cal <= 0) return;
    onAdd({ name: "Quick add", cal, p: 0, f: 0, c: 0, type: mt, date: td(), id: Date.now(), foodRef: null, amt: null, e: "⚡" });
    setQc("");
  };

  const handleSelect = (food) => {
    setSel(food);
    setAmt(100);
    setPortions(1);
  };

  const doConfirm = () => {
    if (!sel) return;
    let cal, pr, fa, ca, logAmt;
    if (sel.fixed) {
      // Fixed portion meal — multiply by number of portions
      cal = sel.cal * portions; pr = sel.p * portions; fa = sel.f * portions; ca = sel.c * portions; logAmt = null;
    } else {
      // Ingredient — multiply by grams
      const m = amt / 100;
      cal = sel.cal * m; pr = sel.p * m; fa = sel.f * m; ca = sel.c * m; logAmt = amt;
    }
    onAdd({ name: sel.n, cal, p: pr, f: fa, c: ca, type: mt, date: td(), id: Date.now(), foodRef: sel.n, amt: logAmt, e: sel.e || "🍽️" });
    setSel(null); setQ(""); setAmt(100); setPortions(1);
  };

  /* ── Detail view ── */
  if (sel) {
    const isFixed = sel.fixed;
    const mult = isFixed ? portions : amt / 100;
    const dispCal = Math.round(sel.cal * mult);
    const dispP = Math.round(sel.p * mult);
    const dispF = Math.round(sel.f * mult);
    const dispC = Math.round(sel.c * mult);

    return (
      <div className="sp">
        <div className="crd ai">
          <button className="bbtn" onClick={() => setSel(null)}>← Terug</button>
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24 }}>
            <div style={{ fontSize: 40, width: 56, height: 56, display: "flex", alignItems: "center", justifyContent: "center", background: "var(--s2)", borderRadius: 14 }}>{sel.e}</div>
            <div>
              <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: -0.3 }}>{sel.n}</div>
              <div style={{ fontSize: 12, color: "var(--t3)", marginTop: 2 }}>
                {isFixed ? `${sel.cal} kcal per ${sel.per}` : `per ${sel.per}`}
              </div>
            </div>
          </div>

          {isFixed ? (
            /* ── Fixed portion: portion counter ── */
            <>
              <div style={{ fontSize: 12, fontWeight: 600, color: "var(--t2)", marginBottom: 10 }}>Aantal porties</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 20, marginBottom: 24 }}>
                <button onClick={() => setPortions(Math.max(0.5, portions - 0.5))} className="chip" style={{ width: 44, padding: "10px 0", fontSize: 18, textAlign: "center" }}>−</button>
                <div style={{ fontSize: 32, fontWeight: 750, minWidth: 60, textAlign: "center", letterSpacing: -1 }}>{portions}×</div>
                <button onClick={() => setPortions(Math.min(5, portions + 0.5))} className="chip" style={{ width: 44, padding: "10px 0", fontSize: 18, textAlign: "center" }}>+</button>
              </div>
            </>
          ) : (
            /* ── Ingredient: gram slider ── */
            <>
              <div style={{ fontSize: 12, fontWeight: 600, color: "var(--t2)", marginBottom: 8 }}>Hoeveelheid</div>
              <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                {[50, 100, 150, 200, 250].map(v => (

                ))}

              <div style={{ fontSize: 28, fontWeight: 750, textAlign: "center", margin: "8px 0 24px", letterSpacing: -1 }}>{amt}g</div>
            </>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 24 }}>
            {[
              { l: "Kcal", v: dispCal, co: "var(--text)" },
              { l: "Eiwit", v: `${dispP}g`, co: "var(--blue)" },
              { l: "Vet", v: `${dispF}g`, co: "var(--amber)" },
              { l: "Carbs", v: `${dispC}g`, co: "var(--green)" },
            ].map(x => (
              <div key={x.l} style={{ textAlign: "center", padding: "12px 4px", background: "var(--s2)", borderRadius: 12 }}>
                <div style={{ fontSize: 17, fontWeight: 700, color: x.co }}>{x.v}</div>
                <div style={{ fontSize: 10, color: "var(--t3)", marginTop: 3 }}>{x.l}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 12, fontWeight: 600, color: "var(--t2)", marginBottom: 8 }}>Maaltijd</div>
          <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
            {MT.map(t => (
              <button key={t.id} onClick={() => setMt(t.id)} className={`chip ${mt === t.id ? "ca" : ""}`}>{t.i} {t.l}</button>
            ))}
          </div>
          <button className="pbtn fw" onClick={doConfirm}>+ Toevoegen · {dispCal} kcal</button>
        </div>
      </div>
    );
  }

  /* ── Search result row component ── */
  const FoodItem = ({ food, onClick, trailing }) => (

      <div style={{ flex: 1, minWidth: 0 }}>
        <div className="mname">{food.n}</div>
        <div style={{ fontSize: 11, color: "var(--t3)" }}>
          {food.cal} kcal / {food.per}
          {food.fixed && <span style={{ marginLeft: 6, background: "var(--acc2)", color: "var(--acc)", padding: "1px 6px", borderRadius: 6, fontSize: 10, fontWeight: 600 }}>gerecht</span>}
        </div>
      </div>
      {trailing || <svg width="16" height="16" viewBox="0 0 16 16" style={{ color: "var(--t3)", flexShrink: 0 }}><path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>}
    </div>
  );

  return (
    <div className="sp">
      <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
        {MT.map(t => (
          <button key={t.id} onClick={() => setMt(t.id)} className={`chip ${mt === t.id ? "ca" : ""}`}>{t.i} {t.l}</button>
        ))}
      </div>
      <div className="crd ai" style={{ padding: 5 }}>
        <div style={{ display: "flex", gap: 4 }}>
          {[{ id: "search", l: "🔍 Zoeken" }, { id: "quick", l: "⚡ Quick add" }].map(t => (
            <button key={t.id} onClick={() => setMode(t.id)} className={`tbtn ${mode === t.id ? "ta" : ""}`}>{t.l}</button>
          ))}
        </div>
      </div>
      {mode === "search" && (
        <>
          <div className="crd ai" style={{ marginTop: 10 }}>
            <div style={{ position: "relative" }}>
              <svg style={{ position: "absolute", left: 13, top: "50%", transform: "translateY(-50%)", color: "var(--t3)" }} width="16" height="16" viewBox="0 0 16 16"><circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" strokeWidth="1.5"/><path d="M11 11l3.5 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
              <input ref={ir} type="text" value={q} onChange={e => setQ(e.target.value)} placeholder="Zoek ingrediënt of gerecht..." className="sinp" />
              {q && <button onClick={() => { setQ(""); setApiRes([]); }} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "var(--t3)", cursor: "pointer", fontSize: 14 }}>✕</button>}

                {apiRes.map((food, i) => (
                  <FoodItem key={food.n + i} food={food} onClick={() => handleSelect(food)} />

          {rec.length > 0 && q.length < 2 && (
            <div className="crd ai" style={{ marginTop: 10, animationDelay: "80ms" }}>

  );

function ProgressScreen({ meals, weights, onAddW }) {
  const [nw, setNw] = useState("");
  const sorted = useMemo(() => [...weights].sort((a, b) => a.date.localeCompare(b.date)), [weights]);
  const last = sorted.slice(-7);
  const doAdd = () => { const w = parseFloat(nw.replace(",", ".")); if (!w || w < 30 || w > 300) return; onAddW({ date: td(), weight: w, id: Date.now() }); setNw(""); };

  let streak = 0;
  for (let i = 0; i < 365; i++) { const d = new Date(); d.setDate(d.getDate() - i); if (meals.some(m => m.date === d.toISOString().slice(0, 10))) streak++; else break; }

  const weeks = useMemo(() => {
    const dates = [...new Set(meals.map(m => m.date))].sort();
    const w = []; let buf = [], ws = dates[0];
    dates.forEach(d => { buf.push(meals.filter(m => m.date === d).reduce((s, m) => s + m.cal, 0)); if (buf.length === 7) { w.push({ s: ws, a: Math.round(buf.reduce((a, b) => a + b) / 7) }); buf = []; ws = d; } });
    if (buf.length) w.push({ s: ws, a: Math.round(buf.reduce((a, b) => a + b) / buf.length), p: true });
    return w;
  }, [meals]);

  const ch = useMemo(() => {
    if (last.length < 2) return null;
    const v = last.map(w => w.weight), mn = Math.min(...v) - 0.5, mx = Math.max(...v) + 0.5, rg = mx - mn || 1;
    const W = 320, H = 130, px = 40, py = 20;
    const pts = last.map((w, i) => ({ x: px + (i / (last.length - 1)) * (W - px * 2), y: py + (1 - (w.weight - mn) / rg) * (H - py * 2), w }));
    return { W, H, px, py, pts, mn, mx, rg, d: pts.map((p, i) => `${i ? "L" : "M"}${p.x},${p.y}`).join(" "), area: pts.map((p, i) => `${i ? "L" : "M"}${p.x},${p.y}`).join(" ") + `L${pts[pts.length - 1].x},${H - py}L${pts[0].x},${H - py}Z` };
  }, [last]);

  return (
    <div className="sp">
      <div className="crd ai" style={{ textAlign: "center", padding: "32px 16px" }}>
        <div style={{ fontSize: 56, fontWeight: 800, color: "var(--acc)", lineHeight: 1, letterSpacing: -2 }}>{streak}</div>
        <div style={{ fontSize: 14, color: "var(--t2)", marginTop: 8 }}>{streak === 1 ? "dag streak" : "dagen streak"} 🔥</div>
        {streak >= 7 && <div style={{ fontSize: 12, color: "var(--acc)", marginTop: 4, fontWeight: 600 }}>Sterk bezig! 💪</div>}
      </div>
      <div className="crd ai" style={{ marginTop: 12, animationDelay: "40ms" }}>
        <div className="slbl">⚖️ Gewicht</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 14 }}>
          <input type="text" inputMode="decimal" value={nw} onChange={e => setNw(e.target.value)} placeholder="82.5"
            onKeyDown={e => e.key === "Enter" && doAdd()} className="winp" />
          <span style={{ fontSize: 13, color: "var(--t2)" }}>kg</span>
          <button className="pbtn" onClick={doAdd}>+ Log</button>
        </div>
        {ch && (
          <svg width="100%" viewBox={`0 0 ${ch.W} ${ch.H + 24}`} style={{ marginBottom: 6 }}>
            <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--acc)" stopOpacity="0.18"/><stop offset="100%" stopColor="var(--acc)" stopOpacity="0"/></linearGradient></defs>
            {[ch.mn, (ch.mn + ch.mx) / 2, ch.mx].map((v, i) => {
              const y = ch.py + (1 - (v - ch.mn) / ch.rg) * (ch.H - ch.py * 2);
              return <g key={i}><line x1={ch.px} y1={y} x2={ch.W - ch.px} y2={y} stroke="var(--s3)" strokeWidth="0.5" /><text x={ch.px - 6} y={y + 3} textAnchor="end" fontSize="9" fill="var(--t3)" fontFamily="DM Sans">{v.toFixed(1)}</text></g>;
            })}
            <path d={ch.area} fill="url(#wg)" />
            <path d={ch.d} fill="none" stroke="var(--acc)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
            {ch.pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="4.5" fill="var(--acc)" stroke="var(--crd)" strokeWidth="2.5" />)}
            {ch.pts.map((p, i) => <text key={`l${i}`} x={p.x} y={ch.H + 16} textAnchor="middle" fontSize="9" fill="var(--t3)" fontFamily="DM Sans">{p.w.date.slice(5)}</text>)}
          </svg>
        )}
        {last.length > 0 && [...last].reverse().map(w => (
          <div key={w.id} className="wrow"><span style={{ fontSize: 12, color: "var(--t3)" }}>{w.date}</span><span style={{ fontSize: 14, fontWeight: 650 }}>{w.weight} kg</span></div>
        ))}
      </div>
      {weeks.length > 0 && (
        <div className="crd ai" style={{ marginTop: 12, animationDelay: "80ms" }}>
          <div className="slbl">📊 Weekgemiddelden</div>
          {weeks.map((w, i) => (
            <div key={i} className="wrow"><span style={{ fontSize: 12, color: "var(--t3)" }}>Week {w.s.slice(5)}{w.p ? " (lopend)" : ""}</span><span style={{ fontSize: 14, fontWeight: 650 }}>{w.a.toLocaleString()} kcal/dag</span></div>
          ))}
        </div>
      )}
    </div>
  );
}

  const [weights, setWeights] = useState(() => ld(SK.weights, []));
  const [goals, setGoals] = useState(() => ld(SK.goals, DG));
  const [fav, setFav] = useState(() => ld(SK.fav, []));
  const [theme, setTheme] = useState(() => ld(SK.theme, "auto"));

  useEffect(() => sv(SK.meals, meals), [meals]);
  useEffect(() => sv(SK.weights, weights), [weights]);
  useEffect(() => sv(SK.goals, goals), [goals]);
  useEffect(() => sv(SK.fav, fav), [fav]);
  useEffect(() => sv(SK.theme, theme), [theme]);

  // Resolve effective theme
  const [sysDark, setSysDark] = useState(() => window.matchMedia?.("(prefers-color-scheme: dark)").matches);

    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const handler = (e) => setSysDark(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);
  const isDark = theme === "dark" || (theme === "auto" && sysDark);

  const addMeal = useCallback(m => { setMeals(p => [...p, m]); setTab("today"); }, []);
  const delMeal = useCallback(id => setMeals(p => p.filter(m => m.id !== id)), []);
  const addW = useCallback(e => setWeights(p => [...p.filter(w => w.date !== e.date), e]), []);
  const togFav = useCallback(n => setFav(p => p.includes(n) ? p.filter(f => f !== n) : [...p, n]), []);
  const saveG = useCallback(g => { setGoals(g); setTab("today"); }, []);

  const tabs = [
    { id: "today", l: "Today", svg: <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" strokeWidth="1.5"/><path d="M11 7v4l2.5 2.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg> },
    { id: "add", l: "Toevoegen", svg: <svg width="22" height="22" viewBox="0 0 22 22"><rect x="4" y="4" width="14" height="14" rx="7" fill="none" stroke="currentColor" strokeWidth="1.5"/><path d="M11 8v6M8 11h6" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg> },
    { id: "progress", l: "Progressie", svg: <svg width="22" height="22" viewBox="0 0 22 22"><path d="M4 17l5-6 4 3 5-8" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg> },
    { id: "settings", l: "Instellingen", svg: <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="3" fill="none" stroke="currentColor" strokeWidth="1.5"/><path d="M11 4v2M11 16v2M4 11h2M16 11h2M5.6 5.6l1.4 1.4M15 15l1.4 1.4M5.6 16.4l1.4-1.4M15 7l1.4-1.4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg> },
  ];

  return (
    <div className={`bite ${isDark ? "dark" : "light"}`}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap');
        .bite {
          --acc: #10B981; --acc2: #10B98118; --blue: #6366F1; --amber: #F59E0B; --green: #10B981; --red: #EF4444;
          max-width: 430px; margin: 0 auto; font-family: 'DM Sans', -apple-system, sans-serif;
          -webkit-font-smoothing: antialiased; min-height: 100vh; position: relative;
        }
        .bite.light {
          --text: #111827; --t2: #6B7280; --t3: #9CA3AF; --crd: #FFFFFF; --s2: #F3F4F6; --s3: #E5E7EB; --brd: #E5E7EB;
          color: #111827; background: #F3F4F6;
        }
        .bite.dark {
          --text: #F9FAFB; --t2: #9CA3AF; --t3: #6B7280; --crd: #1F2937; --s2: #111827; --s3: #374151; --brd: #374151;
          color: #F9FAFB; background: #111827;
        }
        * { box-sizing: border-box; margin: 0; }
        .sp { padding: 0 16px 120px; }
        .crd { background: var(--crd); border-radius: 20px; padding: 18px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .ai { animation: fadeUp 0.4s cubic-bezier(.4,0,.2,1) both; }
        .slbl { font-size: 13px; font-weight: 600; color: var(--t2); margin-bottom: 12px; }
        .mname { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pbtn { background: var(--acc); color: #fff; border: none; border-radius: 14px; padding: 12px 22px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform 0.1s, opacity 0.15s; }
        .pbtn:active { transform: scale(0.97); }
        .pbtn:disabled { opacity: 0.35; }
        .pbtn.fw { width: 100%; padding: 15px; font-size: 15px; }
        .chip { padding: 8px 15px; border-radius: 24px; border: 1.5px solid var(--brd); background: transparent; font-size: 12px; font-family: inherit; cursor: pointer; color: var(--t2); transition: all 0.15s; flex-shrink: 0; font-weight: 500; }
        .chip:active { transform: scale(0.95); }
        .ca { background: var(--acc2); border-color: var(--acc); color: var(--acc); font-weight: 650; }
        .tbtn { flex: 1; padding: 10px; border-radius: 12px; border: none; background: transparent; font-size: 13px; font-family: inherit; cursor: pointer; color: var(--t3); transition: all 0.15s; font-weight: 500; }
        .ta { background: var(--acc2); color: var(--acc); font-weight: 650; }
        .sinp { width: 100%; padding: 12px 36px 12px 40px; border: 1.5px solid var(--brd); border-radius: 14px; font-size: 15px; background: var(--s2); color: var(--text); outline: none; font-family: inherit; transition: border-color 0.2s; }
        .sinp:focus { border-color: var(--acc); }
        .sinp::placeholder { color: var(--t3); }
        .frow { display: flex; align-items: center; gap: 10px; padding: 11px 4px; border-bottom: 0.5px solid var(--brd); cursor: pointer; transition: background 0.1s; border-radius: 10px; margin: 0 -4px; }
        .frow:hover { background: var(--s2); }
        .frow:last-child { border-bottom: none; }
        .mrow { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--brd); }
        .mrow:last-child { border-bottom: none; }
        .memoji { font-size: 20px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--s2); border-radius: 12px; flex-shrink: 0; }
        .xbtn { background: none; border: none; color: var(--t3); cursor: pointer; padding: 6px; border-radius: 8px; transition: all 0.15s; opacity: 0.35; display: flex; align-items: center; }
        .xbtn:hover { opacity: 1; color: var(--red); background: var(--s2); }
        .bbtn { background: none; border: none; font-size: 13px; color: var(--acc); cursor: pointer; padding: 0; margin-bottom: 18px; font-family: inherit; font-weight: 600; }
        .qinp { flex: 1; padding: 16px; border: 2px solid var(--brd); border-radius: 16px; font-size: 28px; font-weight: 750; text-align: center; background: var(--s2); color: var(--text); outline: none; font-family: inherit; letter-spacing: -1px; }
        .qinp:focus { border-color: var(--acc); }
        .qinp::placeholder { color: var(--t3); font-weight: 400; font-size: 22px; }
        .winp { flex: 1; padding: 11px; border: 1.5px solid var(--brd); border-radius: 12px; font-size: 16px; font-weight: 650; text-align: center; background: var(--s2); color: var(--text); outline: none; font-family: inherit; }
        .winp:focus { border-color: var(--acc); }
        .wrow { display: flex; justify-content: space-between; align-items: center; padding: 9px 2px; border-bottom: 0.5px solid var(--brd); }
        .wrow:last-child { border-bottom: none; }
        .atag { font-size: 11px; color: var(--acc); font-weight: 700; background: var(--acc2); padding: 4px 12px; border-radius: 14px; }
        .ri { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: var(--s3); border-radius: 2px; outline: none; }
        .ri::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--acc); border: 3px solid var(--crd); cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .tbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--crd); border-top: 0.5px solid var(--brd); display: flex; justify-content: space-around; padding: 8px 0 max(env(safe-area-inset-bottom, 8px), 8px); z-index: 100; }
        @supports (backdrop-filter: blur(20px)) { .tbar { background: color-mix(in srgb, var(--crd) 80%, transparent); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); } }
        .ti { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 10px; font-size: 10px; font-family: inherit; font-weight: 500; color: var(--t3); transition: color 0.2s; position: relative; }
        .ti.ac { color: var(--acc); }
        .ti.ac::after { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background: var(--acc); border-radius: 1.5px; }
        .hdr { display: flex; justify-content: space-between; align-items: baseline; padding: 20px 20px 14px; }
        .hdr h1 { font-size: 26px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        .hdr h1 span { color: var(--acc); }
        .hdr p { font-size: 12px; color: var(--t3); font-weight: 500; margin: 0; }
      `}</style>
      <div className="hdr">
        <h1>bite<span>.</span></h1>
        <p>{new Date().toLocaleDateString("nl-BE", { weekday: "long", day: "numeric", month: "long" })}</p>
      </div>
      {tab === "today" && <TodayScreen meals={meals} goals={goals} onDel={delMeal} goAdd={() => setTab("add")} />}
      {tab === "add" && <AddScreen onAdd={addMeal} meals={meals} fav={fav} onTogFav={togFav} />}
      {tab === "progress" && <ProgressScreen meals={meals} weights={weights} onAddW={addW} />}
      {tab === "settings" && <SettingsScreen goals={goals} onSave={saveG} theme={theme} onTheme={setTheme} />}
      <div className="tbar">
        {tabs.map(t => (
          <button key={t.id} className={`ti ${tab === t.id ? "ac" : ""}`} onClick={() => setTab(t.id)}>
            {t.svg}<span>{t.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Bite));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
